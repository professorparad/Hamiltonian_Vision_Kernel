name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static documentation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Stage canonical paper
        run: |
          mkdir -p docs/assets/papers
          cp paper_hvk.pdf docs/assets/papers/paper_hvk.pdf

      - name: Validate static site files
        run: |
          test -f docs/index.html
          test -f docs/.nojekyll
          test -f docs/assets/papers/paper_hvk.pdf
          test -f docs/assets/figures/cifar32_all_architecture_benchmark.png

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
